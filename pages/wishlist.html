<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | Payel Food Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <header class="header"><div class="container"><div class="header-inner">
        <a href="../index.html" class="logo"><span class="logo-icon">🍜</span><div class="logo-text"><strong>Payel Food</strong><small>Premium Snacks</small></div></a>
        <div class="header-actions">
            <a href="cart.html" class="header-btn"><i class="fas fa-shopping-bag"></i><span class="count-badge" id="cartCount">0</span></a>
            <a href="../index.html" class="btn btn-outline btn-sm"><i class="fas fa-home"></i> Home</a>
        </div>
    </div></div></header>

    <div class="breadcrumb-bar"><div class="container"><nav class="breadcrumb"><a href="../index.html">Home</a><i class="fas fa-chevron-right"></i><span>Wishlist</span></nav></div></div>

    <section class="section">
        <div class="container">
            <div class="page-header"><h1>My Wishlist</h1></div>
            <div id="wishlistContent"></div>
        </div>
    </section>

    <footer class="footer-simple"><div class="container"><p>&copy; 2026 Payel Food Products.</p></div></footer>
    <div id="toastContainer"></div>
    <script src="../js/main.js"></script>
    <script>
    function renderWishlistPage() {
        const container = document.getElementById('wishlistContent');
        if (wishlist.length === 0) {
            container.innerHTML = `<div class="empty-state"><span>❤️</span><h2>Your wishlist is empty</h2><p>Save products you love for later.</p><a href="products.html" class="btn btn-primary">Browse Products</a></div>`;
            return;
        }
        const items = wishlist.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
        container.innerHTML = `<div class="products-grid">${items.map(p => renderProductCard(p)).join('')}</div>`;
    }
    document.addEventListener('DOMContentLoaded', () => { renderWishlistPage(); updateCartUI(); updateWishlistUI(); });
    </script>
</body>
</html>
