<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products | Payel Food Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="container">
            <div class="header-inner">
                <a href="../index.html" class="logo">
                    <div class="brand-logo"><img src="https://i.ibb.co/Y4jHdTpk/logo.png" alt="Payel Food Products" class="logo-img"><span class="brand-tagline">Payel Food Products</span></div>
                    
                </a>
                <div class="header-actions">
                    <a href="account.html" class="header-icon-btn"><i class="fas fa-user"></i></a>
                    <a href="wishlist.html" class="header-icon-btn"><i class="fas fa-heart"></i><span class="count-badge" id="wishlistCount">0</span></a>
                    <a href="cart.html" class="header-icon-btn"><i class="fas fa-shopping-bag"></i><span class="count-badge" id="cartCount">0</span></a>
                </div>
            </div>
        </div>
    </header>

    <!-- Product Search Section -->
    <section class="section" style="padding-top: 24px;">
        <div class="container">
            <!-- Big Search Bar -->
            <div class="product-search-hero">
                <h2>Find Your Favorite Snacks</h2>
                <p>Search by product name, category, or keyword</p>
                <div class="product-search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="productSearchInput" placeholder="Search chanachur, bhujia, mixture, chips..." autocomplete="off" autofocus>
                    <button class="search-btn" id="searchBtn" onclick="searchProducts()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
                <!-- Quick Category Tags -->
                <div class="quick-tags">
                    <button class="quick-tag" onclick="quickSearch('chanachur')">Chanachur</button>
                    <button class="quick-tag" onclick="quickSearch('bhujia')">Bhujia</button>
                    <button class="quick-tag" onclick="quickSearch('mixture')">Mixture</button>
                    <button class="quick-tag" onclick="quickSearch('namkeen')">Namkeen</button>
                    <button class="quick-tag" onclick="quickSearch('peanut')">Peanut</button>
                    <button class="quick-tag" onclick="quickSearch('chips')">Chips</button>
                    <button class="quick-tag" onclick="quickSearch('papad')">Papad</button>
                    <button class="quick-tag" onclick="quickSearch('moongdal')">Moong Dal</button>
                </div>
            </div>

            <!-- Search Results (Hidden until search) -->
            <div id="searchResults" style="display: none;">
                <div class="search-results-header">
                    <span id="resultsCount"></span>
                    <button class="clear-search-btn" onclick="clearSearch()"><i class="fas fa-times"></i> Clear Search</button>
                </div>
                <div class="products-grid" id="productsGrid"></div>
            </div>

            <!-- Default State: No products shown -->
            <div id="defaultState" class="search-default-state">
                <div class="default-illustration">🔍</div>
                <h3>Search for products above</h3>
                <p>Type a product name or tap a category to find what you're looking for</p>
            </div>
        </div>
    </section>

    <!-- Simple Footer -->
    <footer class="footer-simple">
        <div class="container">
            <p>&copy; 2026 Payel Food Products. All Rights Reserved.</p>
        </div>
    </footer>

    <div id="toastContainer"></div>
    <script src="../js/main.js"></script>
    <script>
    // Search Products
    function searchProducts() {
        const query = document.getElementById('productSearchInput').value.toLowerCase().trim();
        if (query.length < 1) {
            showDefaultState();
            return;
        }
        performSearch(query);
    }

    function quickSearch(term) {
        document.getElementById('productSearchInput').value = term;
        performSearch(term);
    }

    function performSearch(query) {
        const results = PRODUCTS.filter(p =>
            p.name.toLowerCase().includes(query) ||
            p.category.toLowerCase().includes(query) ||
            p.desc.toLowerCase().includes(query)
        );

        document.getElementById('defaultState').style.display = 'none';
        document.getElementById('searchResults').style.display = 'block';

        document.getElementById('resultsCount').innerHTML = results.length > 0
            ? `<strong>${results.length}</strong> product${results.length !== 1 ? 's' : ''} found for "<em>${query}</em>"`
            : `No products found for "<em>${query}</em>"`;

        document.getElementById('productsGrid').innerHTML = results.length > 0
            ? results.map(p => renderProductCard(p)).join('')
            : `<div class="no-results">
                <span style="font-size:3rem;display:block;margin-bottom:12px;">😕</span>
                <h3>No products found</h3>
                <p>Try a different search term or browse categories above.</p>
               </div>`;
    }

    function clearSearch() {
        document.getElementById('productSearchInput').value = '';
        showDefaultState();
    }

    function showDefaultState() {
        document.getElementById('searchResults').style.display = 'none';
        document.getElementById('defaultState').style.display = 'flex';
    }

    // Enter key to search
    document.getElementById('productSearchInput').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') searchProducts();
        // Live search as user types (after 2 chars)
        if (this.value.length >= 2) {
            performSearch(this.value.toLowerCase().trim());
        } else if (this.value.length === 0) {
            showDefaultState();
        }
    });

    // Check URL params
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat');
        if (cat) {
            document.getElementById('productSearchInput').value = cat;
            performSearch(cat);
        }
        updateCartUI();
        updateWishlistUI();
    });
    </script>

    <style>
    /* Product Search Page Specific Styles */
    .product-search-hero {
        text-align: center;
        padding: 30px 0 20px;
    }
    .product-search-hero h2 {
        font-family: var(--font-heading);
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 6px;
        color: var(--text);
    }
    .product-search-hero p {
        font-size: 0.88rem;
        color: var(--text-muted);
        margin-bottom: 20px;
    }
    .product-search-box {
        display: flex;
        align-items: center;
        max-width: 600px;
        margin: 0 auto 16px;
        background: var(--white);
        border: 2px solid var(--border);
        border-radius: 50px;
        padding: 4px 4px 4px 18px;
        transition: var(--transition);
    }
    .product-search-box:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(196, 30, 58, 0.08);
    }
    .product-search-box i {
        color: var(--text-muted);
        font-size: 0.95rem;
    }
    .product-search-box input {
        flex: 1;
        border: none;
        background: none;
        padding: 12px 14px;
        font-size: 0.95rem;
        outline: none;
        color: var(--text);
    }
    .product-search-box input::placeholder {
        color: var(--text-muted);
    }
    .search-btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: var(--transition);
        white-space: nowrap;
    }
    .search-btn:hover {
        background: var(--primary-dark);
    }

    /* Quick Tags */
    .quick-tags {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        margin-top: 14px;
    }
    .quick-tag {
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--white);
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-light);
        cursor: pointer;
        transition: var(--transition);
    }
    .quick-tag:hover {
        border-color: var(--primary);
        color: var(--primary);
        background: var(--primary-light);
    }

    /* Search Results Header */
    .search-results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border-light);
    }
    .search-results-header span {
        font-size: 0.88rem;
        color: var(--text-light);
    }
    .search-results-header em {
        color: var(--primary);
        font-style: normal;
        font-weight: 600;
    }
    .clear-search-btn {
        font-size: 0.8rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 12px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--white);
        cursor: pointer;
        transition: var(--transition);
    }
    .clear-search-btn:hover {
        border-color: var(--primary);
        color: var(--primary);
    }

    /* Default State */
    .search-default-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        text-align: center;
    }
    .default-illustration {
        font-size: 4rem;
        margin-bottom: 16px;
        opacity: 0.6;
    }
    .search-default-state h3 {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text);
    }
    .search-default-state p {
        font-size: 0.88rem;
        color: var(--text-muted);
        max-width: 350px;
    }

    /* Products Grid for this page */
    .products-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
    }
    .products-grid .product-card {
        min-width: auto;
        max-width: none;
    }

    .no-results {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
    }
    .no-results h3 { margin-bottom: 4px; }
    .no-results p { font-size: 0.85rem; }

    @media (min-width: 768px) {
        .products-grid { grid-template-columns: repeat(3, 1fr); }
        .product-search-hero h2 { font-size: 1.8rem; }
    }
    @media (min-width: 1024px) {
        .products-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 480px) {
        .product-search-box { border-radius: 12px; padding: 4px 4px 4px 14px; }
        .search-btn { padding: 10px 16px; }
        .search-btn span { display: none; }
        .product-search-hero h2 { font-size: 1.2rem; }
        .quick-tag { font-size: 0.72rem; padding: 5px 10px; }
    }
    </style>
</body>
</html>
