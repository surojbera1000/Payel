<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products | Payel Food Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="container">
            <div class="header-inner">
                <a href="../index.html" class="logo">
                    <span class="logo-icon">🍜</span>
                    <div class="logo-text"><strong>Payel Food</strong><small>Premium Snacks</small></div>
                </a>
                <div class="search-wrapper" id="searchWrapper">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off">
                    </div>
                    <div class="search-dropdown" id="searchDropdown"></div>
                </div>
                <div class="header-actions">
                    <a href="account.html" class="header-btn"><i class="fas fa-user"></i></a>
                    <a href="wishlist.html" class="header-btn"><i class="fas fa-heart"></i><span class="count-badge" id="wishlistCount">0</span></a>
                    <a href="cart.html" class="header-btn"><i class="fas fa-shopping-bag"></i><span class="count-badge" id="cartCount">0</span></a>
                </div>
            </div>
        </div>
    </header>

    <!-- Breadcrumb -->
    <div class="breadcrumb-bar">
        <div class="container">
            <nav class="breadcrumb">
                <a href="../index.html">Home</a>
                <i class="fas fa-chevron-right"></i>
                <span id="breadcrumbCurrent">All Products</span>
            </nav>
        </div>
    </div>

    <!-- Page Content -->
    <section class="section">
        <div class="container">
            <div class="page-layout">
                <!-- Sidebar Filters -->
                <aside class="filter-sidebar" id="filterSidebar">
                    <div class="filter-header">
                        <h3>Filters</h3>
                        <button class="filter-clear" onclick="clearFilters()">Clear All</button>
                    </div>

                    <div class="filter-group">
                        <h4>Category</h4>
                        <label class="filter-check"><input type="checkbox" value="chanachur" onchange="applyFilters()"> Chanachur</label>
                        <label class="filter-check"><input type="checkbox" value="bhujia" onchange="applyFilters()"> Bhujia</label>
                        <label class="filter-check"><input type="checkbox" value="mixture" onchange="applyFilters()"> Mixture</label>
                        <label class="filter-check"><input type="checkbox" value="namkeen" onchange="applyFilters()"> Namkeen</label>
                        <label class="filter-check"><input type="checkbox" value="peanut" onchange="applyFilters()"> Peanut</label>
                        <label class="filter-check"><input type="checkbox" value="moongdal" onchange="applyFilters()"> Moong Dal</label>
                        <label class="filter-check"><input type="checkbox" value="chips" onchange="applyFilters()"> Chips</label>
                        <label class="filter-check"><input type="checkbox" value="papad" onchange="applyFilters()"> Papad</label>
                    </div>

                    <div class="filter-group">
                        <h4>Price Range</h4>
                        <label class="filter-check"><input type="radio" name="price" value="all" onchange="applyFilters()" checked> All Prices</label>
                        <label class="filter-check"><input type="radio" name="price" value="0-100" onchange="applyFilters()"> Under ₹100</label>
                        <label class="filter-check"><input type="radio" name="price" value="100-200" onchange="applyFilters()"> ₹100 - ₹200</label>
                        <label class="filter-check"><input type="radio" name="price" value="200-500" onchange="applyFilters()"> ₹200 - ₹500</label>
                    </div>

                    <div class="filter-group">
                        <h4>Availability</h4>
                        <label class="filter-check"><input type="checkbox" id="stockFilter" onchange="applyFilters()"> In Stock Only</label>
                    </div>
                </aside>

                <!-- Products Area -->
                <div class="products-area">
                    <div class="products-toolbar">
                        <div class="toolbar-left">
                            <button class="filter-toggle-btn" onclick="toggleFilters()"><i class="fas fa-sliders-h"></i> Filters</button>
                            <span class="product-count" id="productCount">16 products</span>
                        </div>
                        <div class="toolbar-right">
                            <select id="sortSelect" onchange="applyFilters()">
                                <option value="popular">Popularity</option>
                                <option value="newest">Newest First</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="discount">Highest Discount</option>
                                <option value="rating">Highest Rated</option>
                            </select>
                        </div>
                    </div>
                    <div class="products-grid" id="productsGrid"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Simple Footer -->
    <footer class="footer-simple">
        <div class="container">
            <p>&copy; 2026 Payel Food Products. All Rights Reserved.</p>
        </div>
    </footer>

    <div id="toastContainer"></div>
    <script src="../js/main.js"></script>
    <script>
    // Products page logic
    function applyFilters() {
        const cats = [...document.querySelectorAll('.filter-group input[type=checkbox][value]:checked')].map(c => c.value);
        const priceVal = document.querySelector('input[name=price]:checked')?.value || 'all';
        const stockOnly = document.getElementById('stockFilter')?.checked;
        const sortVal = document.getElementById('sortSelect').value;

        let filtered = [...PRODUCTS];

        // Category filter
        if (cats.length > 0) {
            filtered = filtered.filter(p => cats.includes(p.category));
        }

        // Price filter
        if (priceVal !== 'all') {
            const [min, max] = priceVal.split('-').map(Number);
            filtered = filtered.filter(p => p.price >= min && p.price <= max);
        }

        // Stock filter
        if (stockOnly) filtered = filtered.filter(p => p.stock);

        // Sort
        switch (sortVal) {
            case 'price-low': filtered.sort((a, b) => a.price - b.price); break;
            case 'price-high': filtered.sort((a, b) => b.price - a.price); break;
            case 'newest': filtered.sort((a, b) => b.id - a.id); break;
            case 'discount': filtered.sort((a, b) => getDiscount(b.price, b.mrp) - getDiscount(a.price, a.mrp)); break;
            case 'rating': filtered.sort((a, b) => b.rating - a.rating); break;
            default: filtered.sort((a, b) => b.reviews - a.reviews);
        }

        document.getElementById('productCount').textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;
        document.getElementById('productsGrid').innerHTML = filtered.length > 0
            ? filtered.map(p => renderProductCard(p)).join('')
            : '<div class="no-results"><i class="fas fa-search"></i><p>No products found. Try different filters.</p></div>';
    }

    function clearFilters() {
        document.querySelectorAll('.filter-group input[type=checkbox]').forEach(c => c.checked = false);
        document.querySelector('input[name=price][value=all]').checked = true;
        document.getElementById('sortSelect').value = 'popular';
        applyFilters();
    }

    function toggleFilters() {
        document.getElementById('filterSidebar').classList.toggle('active');
    }

    // Init: check URL params for category
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat');
        if (cat) {
            const cb = document.querySelector(`input[value="${cat}"]`);
            if (cb) cb.checked = true;
            document.getElementById('breadcrumbCurrent').textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        }
        applyFilters();
        updateCartUI();
        updateWishlistUI();
        initSearch();
    });
    </script>
</body>
</html>
