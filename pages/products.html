<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Payel Food Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="container">
            <div class="header-inner">
                <div class="header-left-actions">
                    <a href="../index.html" class="header-icon-btn" title="Back"><i class="fas fa-arrow-left"></i></a>
                </div>
                <a href="../index.html" class="logo">
                    <div class="brand-logo"><img src="https://i.ibb.co/Y4jHdTpk/logo.png" alt="Payel Food Products" class="logo-img"><span class="brand-tagline">Payel Food Products</span></div>
                </a>
                <div class="header-left-actions">
                    <a href="wishlist.html" class="header-icon-btn" title="Wishlist"><i class="fas fa-heart"></i><span class="count-badge" id="wishlistCount">0</span></a>
                    <a href="cart.html" class="header-icon-btn" title="Cart"><i class="fas fa-shopping-bag"></i><span class="count-badge" id="cartCount">0</span></a>
                </div>
            </div>
        </div>
    </header>

    <!-- Page Title -->
    <div class="category-page-header" id="categoryHeader">
        <div class="container">
            <h1 id="categoryTitle">All Products</h1>
            <p id="categoryDesc">Browse products added by Payel Food</p>
        </div>
    </div>

    <!-- Products Grid -->
    <section class="section" style="padding-top: 16px;">
        <div class="container">
            <div id="productsContent"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer-simple"><div class="container"><p>&copy; 2026 Payel Food Products. All Rights Reserved.</p></div></footer>

    <div id="toastContainer"></div>
    <script src="../js/main.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat');
        
        // Fetch products from MongoDB
        await fetchProducts(cat && cat !== 'all' ? cat : null);
        
        // Filter products by category
        let filtered = [...PRODUCTS];
        
        if (cat && cat !== 'all') {
            const catLower = cat.toLowerCase().replace(' ', '');
            filtered = PRODUCTS.filter(p => p.category.toLowerCase().replace(' ', '') === catLower);
            
            const catNames = {
                'chanachur': 'Chanachur', 'bhujia': 'Bhujia', 'mixture': 'Mixture',
                'namkeen': 'Namkeen', 'peanut': 'Peanut', 'moongdal': 'Moong Dal',
                'chips': 'Chips', 'papad': 'Papad', 'sweets': 'Sweets', 'pickles': 'Pickles'
            };
            const catName = catNames[catLower] || cat.charAt(0).toUpperCase() + cat.slice(1);
            document.getElementById('categoryTitle').textContent = catName;
            document.getElementById('categoryDesc').textContent = `Showing all ${catName} products`;
            document.title = `${catName} | Payel Food Products`;
        }
        
        // Render products
        const container = document.getElementById('productsContent');
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-products">
                    <span class="empty-icon">📦</span>
                    <h3>No products yet</h3>
                    <p>Products will appear here once added by admin.</p>
                    <a href="../index.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back to Home</a>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="products-count">${filtered.length} product${filtered.length !== 1 ? 's' : ''}</div>
                <div class="products-grid">${filtered.map(p => renderProductCard(p)).join('')}</div>
            `;
        }
        
        updateCartUI();
        updateWishlistUI();
    });
    </script>

    <style>
    .category-page-header {
        background: var(--cream);
        padding: 20px 0;
        border-bottom: 1px solid var(--border-light);
    }
    .category-page-header h1 {
        font-family: var(--font-heading);
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--text);
    }
    .category-page-header p {
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-top: 2px;
    }
    .products-count {
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-bottom: 14px;
    }
    .products-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
    }
    .products-grid .product-card {
        min-width: auto;
        max-width: none;
    }
    .empty-products {
        text-align: center;
        padding: 60px 20px;
    }
    .empty-products .empty-icon {
        font-size: 3.5rem;
        display: block;
        margin-bottom: 14px;
    }
    .empty-products h3 {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text);
    }
    .empty-products p {
        font-size: 0.88rem;
        color: var(--text-muted);
        margin-bottom: 18px;
    }
    @media (min-width: 768px) {
        .products-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1024px) {
        .products-grid { grid-template-columns: repeat(4, 1fr); }
    }
    </style>
</body>
</html>
