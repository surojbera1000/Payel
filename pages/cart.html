<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Payel Food Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="container">
                <div class="nav-content">
                    <div class="logo"><a href="../index.html"><span class="logo-icon">🍜</span><div class="logo-text"><h1>Payel Food</h1><span>Premium Quality Since 2020</span></div></a></div>
                    <div class="nav-actions">
                        <a href="../index.html" class="btn btn-outline-dark btn-sm"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="breadcrumb-section">
        <div class="container">
            <nav class="breadcrumb"><a href="../index.html">Home</a> <i class="fas fa-chevron-right"></i> <span>Shopping Cart</span></nav>
            <h1>Shopping Cart</h1>
        </div>
    </section>

    <section class="page-section">
        <div class="container">
            <div class="cart-layout" id="cartLayout">
                <div class="cart-items" id="cartItems"></div>
                <div class="cart-summary" id="cartSummary"></div>
            </div>
            <div class="empty-cart" id="emptyCart" style="display:none;">
                <div class="empty-icon">🛒</div>
                <h2>Your cart is empty</h2>
                <p>Looks like you haven't added any products yet.</p>
                <a href="products.html" class="btn btn-primary">Start Shopping <i class="fas fa-arrow-right"></i></a>
            </div>
        </div>
    </section>

    <footer class="footer"><div class="container"><div class="footer-bottom"><div class="footer-bottom-content"><p>&copy; 2026 Payel Food Products. All Rights Reserved.</p></div></div></div></footer>

    <script src="../js/main.js"></script>
    <script>
        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            const cartSummary = document.getElementById('cartSummary');
            const cartLayout = document.getElementById('cartLayout');
            const emptyCart = document.getElementById('emptyCart');
            
            if (cart.length === 0) {
                cartLayout.style.display = 'none';
                emptyCart.style.display = 'flex';
                return;
            }
            
            cartLayout.style.display = 'grid';
            emptyCart.style.display = 'none';
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const delivery = subtotal > 499 ? 0 : 49;
            const gst = Math.round(subtotal * 0.05);
            const total = subtotal + delivery + gst;
            
            cartItems.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-image"><span style="font-size:2.5rem;">${item.image}</span></div>
                    <div class="cart-item-details">
                        <h3>${item.name}</h3>
                        <span class="product-category">${item.category}</span>
                        <div class="cart-item-price">₹${item.price} × ${item.quantity} = <strong>₹${item.price * item.quantity}</strong></div>
                    </div>
                    <div class="cart-item-actions">
                        <div class="quantity-control">
                            <button onclick="updateQuantity(${item.id}, -1); renderCart()">−</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity(${item.id}, 1); renderCart()">+</button>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${item.id}); renderCart()"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
            
            cartSummary.innerHTML = `
                <div class="summary-card">
                    <h3>Order Summary</h3>
                    <div class="coupon-input">
                        <input type="text" placeholder="Enter coupon code">
                        <button class="btn btn-sm btn-primary" onclick="showToast('Coupon applied!')">Apply</button>
                    </div>
                    <div class="summary-row"><span>Subtotal</span><span>₹${subtotal}</span></div>
                    <div class="summary-row"><span>Delivery</span><span>${delivery === 0 ? '<span style="color:#10b981">FREE</span>' : '₹' + delivery}</span></div>
                    <div class="summary-row"><span>GST (5%)</span><span>₹${gst}</span></div>
                    <div class="summary-row total"><span>Total</span><span>₹${total}</span></div>
                    ${subtotal < 499 ? '<p class="free-delivery-msg">Add ₹' + (499-subtotal) + ' more for FREE delivery!</p>' : ''}
                    <a href="checkout.html" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:15px;">Proceed to Checkout <i class="fas fa-arrow-right"></i></a>
                    <a href="products.html" class="btn btn-outline-dark btn-sm" style="width:100%;justify-content:center;margin-top:10px;">Continue Shopping</a>
                </div>
            `;
        }
        
        renderCart();
    </script>
</body>
</html>
