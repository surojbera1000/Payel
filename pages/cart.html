<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Payel Food Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <header class="header" id="header">
        <div class="container">
            <div class="header-inner">
                <a href="../index.html" class="logo">
                    <div class="brand-logo"><span class="brand-name">Payel</span><span class="brand-sub">FOOD PRODUCTS</span></div>
                    
                </a>
                <div class="header-actions">
                    <a href="../index.html" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
                </div>
            </div>
        </div>
    </header>

    <div class="breadcrumb-bar">
        <div class="container">
            <nav class="breadcrumb">
                <a href="../index.html">Home</a><i class="fas fa-chevron-right"></i><span>Shopping Cart</span>
            </nav>
        </div>
    </div>

    <section class="section">
        <div class="container">
            <div class="page-header"><h1>Shopping Cart</h1></div>

            <!-- Cart Content (Rendered by JS) -->
            <div id="cartPageContent"></div>
        </div>
    </section>

    <footer class="footer-simple"><div class="container"><p>&copy; 2026 Payel Food Products. All Rights Reserved.</p></div></footer>
    <div id="toastContainer"></div>

    <script src="../js/main.js"></script>
    <script>
    function renderCartPage() {
        const container = document.getElementById('cartPageContent');

        if (cart.length === 0) {
            container.innerHTML = `<div class="empty-state">
                <span>🛒</span>
                <h2>Your cart is empty</h2>
                <p>Looks like you haven't added anything yet.</p>
                <a href="products.html" class="btn btn-primary">Start Shopping</a>
            </div>`;
            return;
        }

        const subtotal = getCartTotal();
        const delivery = subtotal >= 499 ? 0 : 49;
        const gst = Math.round(subtotal * 0.05);
        const total = subtotal + delivery + gst;

        container.innerHTML = `<div class="cart-page-layout">
            <div class="cart-items-list">
                ${cart.map(item => {
                    const p = PRODUCTS.find(pr => pr.id === item.id);
                    if (!p) return '';
                    return `<div class="cart-page-item">
                        <div class="cart-page-item-img">${p.image}</div>
                        <div class="cart-page-item-info">
                            <h3>${p.name}</h3>
                            <div class="meta">${p.weight} · ${p.category} · ₹${p.price}/unit</div>
                            <div class="item-price">₹${p.price * item.qty}</div>
                        </div>
                        <div class="cart-page-item-actions">
                            <div class="qty-control">
                                <button onclick="updateQty(${p.id}, -1); renderCartPage()">−</button>
                                <span>${item.qty}</span>
                                <button onclick="updateQty(${p.id}, 1); renderCartPage()">+</button>
                            </div>
                            <button class="remove-btn" onclick="removeFromCart(${p.id}); renderCartPage()">
                                <i class="fas fa-trash-alt"></i> Remove
                            </button>
                        </div>
                    </div>`;
                }).join('')}
            </div>
            <div class="order-summary">
                <h3>Order Summary</h3>
                <div class="coupon-row">
                    <input type="text" placeholder="Coupon code" id="couponInput">
                    <button class="btn btn-sm btn-outline" onclick="showToast('Coupon applied: PAYEL20')">Apply</button>
                </div>
                <div class="summary-row"><span>Subtotal (${getCartCount()} items)</span><span>₹${subtotal}</span></div>
                <div class="summary-row"><span>Delivery</span><span class="${delivery === 0 ? 'free' : ''}">${delivery === 0 ? 'FREE' : '₹' + delivery}</span></div>
                <div class="summary-row"><span>GST (5%)</span><span>₹${gst}</span></div>
                ${subtotal < 499 ? `<div style="font-size:0.78rem;color:var(--green);padding:8px 0;">Add ₹${499 - subtotal} more for FREE delivery!</div>` : ''}
                <div class="summary-row total"><span>Total</span><span>₹${total}</span></div>
                <a href="checkout.html" class="btn btn-primary btn-block" style="margin-top:14px;">Proceed to Checkout <i class="fas fa-arrow-right"></i></a>
                <a href="products.html" class="btn btn-outline btn-block" style="margin-top:8px;">Continue Shopping</a>
            </div>
        </div>`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderCartPage();
        updateCartUI();
    });
    </script>
</body>
</html>
